<!DOCTYPE html>
<html>
    {{ template "head" . }}
    {{ template "navbar" . }}

    <div class="max-w-3xl mx-auto px-4 py-6">

        <!-- 🔥 CONTAINER UTAMA -->
        <div class="bg-white shadow-sm rounded-lg p-5">

            <!-- 404 MESSAGE -->
            <div class="text-center">
                <h1 class="text-xl font-semibold text-gray-800">
                    {{.Message}}
                </h1>
            </div>

            <!-- 🔻 DIVIDER -->
            <div class="flex items-center my-10">
                <div class="flex-grow border-t border-gray-300"></div>

                <div class="flex items-center gap-2 text-gray-700 font-semibold px-4">
                    <span>Coba baca ini dulu</span>

                    <!-- SVG ICON -->
                    <svg xmlns="http://www.w3.org/2000/svg" 
                         class="w-5 h-5 text-gray-500 animate-bounce"
                         fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" 
                              stroke-linejoin="round" 
                              stroke-width="2"
                              d="M17 13l-5 5m0 0l-5-5m5 5V6" />
                    </svg>
                </div>

                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <!-- 🔥 LIST ARTIKEL -->
            <div class="space-y-4">

                {{range .latest}}
                <a href="/berita/{{.Slug}}" 
                   class="flex gap-4 group p-3 rounded-lg hover:bg-gray-50 transition">

                    <!-- GAMBAR -->
                    <img src="{{.Gambar}}" 
                         alt="{{.Judul}}"
                         class="w-24 h-20 object-cover rounded-md flex-shrink-0">

                    <!-- KONTEN -->
                    <div class="flex flex-col justify-between">

                        <h3 class="text-base font-semibold text-gray-900 leading-snug 
                                   overflow-hidden"
                            style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">
                            {{.Judul}}
                        </h3>

                        <p class="text-sm text-gray-500 mt-1 line-clamp-2">
                            {{excerpt .Isi}}
                        </p>

                    </div>

                </a>
                {{end}}

            </div>

        </div>

    </div>

    {{ template "footer" . }}
