<!DOCTYPE html>
<html>
<head>
    <title>Login Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">

    <!-- Card -->
    <div class="bg-white shadow-md rounded-lg p-6 w-full max-w-sm">

        <h2 class="text-xl font-bold text-center text-gray-800 mb-6">
            Login Admin
        </h2>

        <form action="/login" method="POST" class="space-y-4">

            <!-- Username -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Username
                </label>
                <input type="text" name="username"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Password
                </label>
                <input type="password" name="password"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Button -->
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-md font-semibold hover:bg-blue-700 transition">
                Login
            </button>

        </form>

    </div>

</body>
</html>
