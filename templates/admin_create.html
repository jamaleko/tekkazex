<!DOCTYPE html>
<html>
<head>
    <title>Tambah Berita</title>

    <!-- TinyMCE -->
    <script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js"></script>

    <script>
        tinymce.init({
        selector: 'textarea',
        height: 300,
    
        plugins: 'lists link image code paste',
    
        toolbar: 'undo redo | bold italic | h2 h3 | alignleft aligncenter alignright | bullist numlist | link image | code',
    
        contextmenu: false, // 🔥 penting untuk HP
        browser_spellcheck: true,
    
        paste_as_text: false,
        paste_data_images: true,
    
        // 🔥 whitelist tag bersih
        extended_valid_elements: 'h1,h2,h3,h4,h5,h6,p,ul,ol,li,a[href|target],strong,em,br,img[src|alt]',
    
        // 🔥 bersihin HTML dari ChatGPT / web lain
        paste_preprocess: function(plugin, args) {
            let content = args.content;
    
            // hapus atribut data-*
            content = content.replace(/data-[^=]+="[^"]*"/g, '');
    
            // hapus class & style
            content = content.replace(/class="[^"]*"/g, '');
            content = content.replace(/style="[^"]*"/g, '');
    
            // hapus span kosong
            content = content.replace(/<\/?span[^>]*>/g, '');
    
            args.content = content;
        },
    
        mobile: {
            toolbar: 'undo redo | h2 h3 | bullist numlist | bold italic'
        },
    
        setup: function(editor) {
    
            editor.ui.registry.addButton('h2', {
                text: 'H2',
                onAction: function() {
                    editor.execCommand('FormatBlock', false, 'h2');
                }
            });
    
            editor.ui.registry.addButton('h3', {
                text: 'H3',
                onAction: function() {
                    editor.execCommand('FormatBlock', false, 'h3');
                }
            });
    
        }
    });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

{{ template "navbar_admin" . }}

<div class="max-w-3xl mx-auto px-4 py-6">

    <!-- Card -->
    <div class="bg-white shadow-sm p-6">

        <h2 class="text-xl font-bold text-gray-800 mb-6 text-center">
            Tambah Berita
        </h2>

        <form action="/admin/create" 
              method="POST" 
              enctype="multipart/form-data"
              class="space-y-5">

            <!-- Judul -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Judul
                </label>
                <input type="text" name="judul"
                       class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Isi -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Isi
                </label>
                <textarea name="isi" class="w-full"></textarea>
            </div>

            <!-- Gambar -->
            <div>
                <label class="block text-sm text-gray-600 mb-1">
                    Gambar
                </label>
                <input type="file" name="gambar"
                       class="w-full text-sm">
            </div>

            <!-- Button -->
            <button type="submit"
                    class="w-full bg-green-600 text-white py-2 rounded-md font-semibold hover:bg-green-700 transition">
                Simpan
            </button>

        </form>

    </div>
</div>
</body>
</html>
