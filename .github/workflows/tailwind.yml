name: Build Tailwind CSS

on:
  push:
    branches: ["main"]

permissions:
  contents: write   # penting agar Actions bisa push ke repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install Tailwind CSS
      - run: npm install -D tailwindcss@3.4.3

      # Build CSS
      - run: npx tailwindcss -i ./input.css -o ./static/css/style.css --minify

      # Commit hasil build CSS (hanya jika ada perubahan)
      - name: Commit CSS
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add static/css/style.css
          git diff --cached --exit-code || git commit -m "auto build css"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
